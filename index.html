<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PT. Alexa Computindo Group - Solusi IT & Media Digital Terdepan</title>

    <!-- Schema Markup untuk Optimasi SEO: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Alexa Computindo Group",
      "url": "https://alexagroup.co.id",
      "logo": "https://alexagroup.co.id/favicon.svg",
      "email": "info@alexagroup.co.id",
      "telephone": "+62-811-1234-5678",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Jl. Raya Teknologi Digital No. 88",
        "addressLocality": "Jakarta Selatan",
        "addressRegion": "DKI Jakarta",
        "postalCode": "12190",
        "addressCountry": "ID"
      },
      "sameAs": [
        "https://facebook.com/alexagroup",
        "https://instagram.com/alexagroup",
        "https://linkedin.com/company/alexagroup"
      ]
    }
    </script>

    <!-- Schema Markup untuk Optimasi SEO: WebSite & SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://alexagroup.co.id",
      "name": "Alexa Computindo Group",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://alexagroup.co.id/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
